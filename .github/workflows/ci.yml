name: PR CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# Cancel superseded runs on the same ref (e.g. new push to a PR branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      SOLUTION: GraphLibrary/GraphLibrary.slnx

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x

      - name: Restore
        run: dotnet restore "$SOLUTION"

      - name: Build
        run: dotnet build "$SOLUTION" --configuration Release --no-restore

      - name: Test
        run: dotnet test "$SOLUTION" --configuration Release --no-build --verbosity normal
